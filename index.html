<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#1A56DB" />
<meta name="description" content="GeoDojo - Can you name them all? Play. Learn. Compete." />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="icon" href="/favicon.ico" />
<link rel="manifest" href="/manifest.json" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<title>GeoDojo</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#FFFFFF;color:#1A1A2E;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;overscroll-behavior:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;-webkit-tap-highlight-color:transparent}
button:active{transform:translateY(2px) scale(0.98) !important;transition:transform .1s !important}
input,select{font-family:inherit}
img{display:block}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#E2E6EC;border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 4px 0 0 #1648B8}50%{box-shadow:0 4px 0 0 #1648B8,0 0 16px rgba(26,86,219,.35)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.fadeUp{animation:fadeUp .3s cubic-bezier(.22,1,.36,1) both}
.glass{background:rgba(255,255,255,.65);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(26,86,219,.08)}
.glass-dark{background:rgba(255,255,255,.04);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.06)}
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
